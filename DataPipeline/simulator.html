<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Berkshire Valley – Course Mode Simulator</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#fff; font-family:-apple-system,sans-serif; display:flex; height:100vh; }
#map { flex:1; }
#hud {
  width:280px; background:#1a1a1a; padding:20px; display:flex;
  flex-direction:column; gap:16px; overflow-y:auto;
}
h2 { font-size:14px; color:#888; text-transform:uppercase; letter-spacing:1px; }
.hole-badge {
  background:#2a2a2a; border-radius:12px; padding:12px 16px;
  display:flex; align-items:center; gap:12px;
}
.hole-num { font-size:36px; font-weight:900; color:#B89A5E; line-height:1; }
.hole-info { display:flex; flex-direction:column; gap:2px; }
.hole-par { font-size:12px; color:#888; }
.hole-name { font-size:14px; font-weight:700; }
.dist-card {
  background:#2a2a2a; border-radius:12px; padding:14px 16px;
}
.dist-row { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; }
.dist-label { font-size:11px; color:#888; font-weight:700; }
.dist-value { font-size:22px; font-weight:900; color:#fff; }
.dist-value.hero { font-size:38px; color:#fff; }
.dist-unit { font-size:11px; color:#888; margin-left:3px; }
.tee-card { background:#2a2a2a; border-radius:12px; padding:14px 16px; }
.tee-row { display:flex; justify-content:space-between; padding:3px 0; font-size:13px; }
.tee-dot { width:12px; height:12px; border-radius:50%; display:inline-block; margin-right:8px; vertical-align:middle; }
.controls { display:flex; gap:8px; }
button {
  flex:1; padding:10px; border:none; border-radius:8px; font-size:14px;
  font-weight:700; cursor:pointer; transition:opacity 0.2s;
}
#playBtn { background:#B89A5E; color:#000; }
#resetBtn { background:#333; color:#fff; }
.progress-bar { height:4px; background:#333; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:#B89A5E; transition:width 0.1s; }
.tee-selector { display:flex; gap:6px; flex-wrap:wrap; }
.tee-btn {
  padding:5px 10px; border-radius:6px; border:1px solid #444;
  background:#333; color:#fff; font-size:12px; cursor:pointer;
}
.tee-btn.active { background:#B89A5E; border-color:#B89A5E; color:#000; font-weight:700; }
.speed-row { display:flex; align-items:center; gap:8px; font-size:12px; color:#888; }
input[type=range] { flex:1; }
</style>
</head>
<body>
<div id="map"></div>
<div id="hud">
  <div>
    <h2>Berkshire Valley GC</h2>
    <p style="font-size:11px;color:#555;margin-top:4px">Jefferson, NJ · 18 holes</p>
  </div>
  <div class="controls">
    <button id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button id="resetBtn" onclick="reset()">↺ Reset</button>
  </div>
  <div class="speed-row">
    <span>Speed</span>
    <input type="range" id="speedSlider" min="1" max="20" value="5" oninput="updateSpeed()">
    <span id="speedLabel">5x</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="hole-badge">
    <div class="hole-num" id="holeNum">1</div>
    <div class="hole-info">
      <div class="hole-par" id="holePar">Par 4</div>
      <div class="hole-name">Hole <span id="holeNumSmall">1</span> of 18</div>
    </div>
  </div>
  <div class="dist-card">
    <h2 style="margin-bottom:8px">Distance to Green</h2>
    <div class="dist-row">
      <span class="dist-label">F</span>
      <span><span class="dist-value" id="distF">—</span><span class="dist-unit">yd</span></span>
    </div>
    <div class="dist-row" style="border-top:1px solid #333;border-bottom:1px solid #333;padding:6px 0;margin:4px 0">
      <span class="dist-label" style="color:#fff">C</span>
      <span><span class="dist-value hero" id="distC">—</span><span class="dist-unit">yd</span></span>
    </div>
    <div class="dist-row">
      <span class="dist-label">B</span>
      <span><span class="dist-value" id="distB">—</span><span class="dist-unit">yd</span></span>
    </div>
  </div>
  <div>
    <h2 style="margin-bottom:8px">Tee</h2>
    <div class="tee-selector" id="teeSelector"></div>
  </div>
  <div class="tee-card" id="teeYardages">
    <h2 style="margin-bottom:8px">Scorecard (hole <span id="scHole">1</span>)</h2>
    <div id="scContent"></div>
  </div>
</div>

const TEE_COLORS = {Black:'#111',Blue:'#1a6ef5',White:'#eee',Yellow:'#f5d800',Red:'#e33',Gold:'#B89A5E',Gray:'#888'};

let map, playerMarker, pathLines=[], greenMarkers=[], aimMarkers=[];
let idx=0, playing=false, timer=null, selectedTee='Blue', speed=5;

function init() {
  map = L.map('map', {zoomControl:false}).setView([41.0090,-74.5060], 16);
  L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    maxZoom:21, subdomains:['mt0','mt1','mt2','mt3'],
    attribution:'© Google'
  }).addTo(map);

  // Draw all hole paths
  HOLES.forEach(h => {
    const route = [h.tee, ...h.path, h.green];
    L.polyline(route, {color:'rgba(255,255,255,0.3)',weight:2,dashArray:'4,4'}).addTo(map);
    L.circleMarker(h.green, {radius:6,color:'#B89A5E',fillColor:'#B89A5E',fillOpacity:1,weight:2}).addTo(map)
      .bindTooltip('H'+h.number, {permanent:true,direction:'top',offset:[0,-8],className:'hole-label'});
    L.circleMarker(h.tee, {radius:4,color:'#fff',fillColor:'#444',fillOpacity:1,weight:2}).addTo(map);
  });

  // Player dot
  playerMarker = L.circleMarker(WAYPOINTS[0], {
    radius:10, color:'#fff', fillColor:'#007AFF', fillOpacity:1, weight:3
  }).addTo(map);

  buildTeeSelector();
  updateDisplay();
}

function buildTeeSelector() {
  const tees = Object.keys(HOLES[0].teeYards);
  const sel = document.getElementById('teeSelector');
  sel.innerHTML = '';
  tees.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tee-btn' + (t===selectedTee?' active':'');
    btn.innerHTML = `<span class="tee-dot" style="background:${TEE_COLORS[t]||'#888'};border:1px solid #555"></span>${t}`;
    btn.onclick = () => { selectedTee=t; buildTeeSelector(); updateDisplay(); };
    sel.appendChild(btn);
  });
}

function distYards(a, b) {
  const dlat=(a[0]-b[0])*111320, dlon=(a[1]-b[1])*111320*Math.cos(a[0]*Math.PI/180);
  return Math.round(Math.sqrt(dlat*dlat+dlon*dlon)*1.09361);
}

function updateDisplay() {

  const wp = WAYPOINTS[idx];

  const pos = [wp.lat, wp.lon];

  playerMarker.setLatLng(pos);

  const df = Math.round(dc * 0.94);
  const db = Math.round(dc * 1.06);

  document.getElementById('holeNum').textContent = wp.hole;
  document.getElementById('holeNumSmall').textContent = wp.hole;
  document.getElementById('holePar').textContent = 'Par '+wp.par;
  document.getElementById('distC').textContent = dc;
  document.getElementById('distF').textContent = df;
  document.getElementById('distB').textContent = db;
  document.getElementById('scHole').textContent = wp.hole;

  // Scorecard for selected tee
  const yds = hole.teeYards[selectedTee];
  const sc = document.getElementById('scContent');
  sc.innerHTML = yds
    ? `<div class="tee-row"><span style="color:${TEE_COLORS[selectedTee]||'#888'}">■ ${selectedTee}</span><span>${yds} yd</span></div>`
      + Object.entries(hole.teeYards).filter(([t])=>t!==selectedTee)
          .map(([t,y])=>`<div class="tee-row" style="color:#555"><span>${t}</span><span>${y}</span></div>`).join('')
    : '<div style="color:#555;font-size:12px">No yardage data</div>';

  const pct = (idx/WAYPOINTS.length)*100;
  document.getElementById('progress').style.width = pct+'%';
}

function step() {
  if(idx < WAYPOINTS.length-1) {
    idx++;
    updateDisplay();
    // Pan map to follow player
    if(idx%5===0) map.panTo([WAYPOINTS[idx].lat, WAYPOINTS[idx].lon], {animate:true,duration:0.3});
  } else {
    playing=false;
    document.getElementById('playBtn').textContent='▶ Play';
  }
}

function togglePlay() {
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? '⏸ Pause' : '▶ Play';
  if(playing) {
    const interval = Math.max(50, 1200/speed);
    timer = setInterval(step, interval);
  } else {
    clearInterval(timer);
  }
}

function reset() {
  clearInterval(timer); playing=false;
  document.getElementById('playBtn').textContent='▶ Play';
  idx=0; updateDisplay();
  map.setView([41.0090,-74.5060], 16);
}

function updateSpeed() {
  speed = parseInt(document.getElementById('speedSlider').value);
  document.getElementById('speedLabel').textContent = speed+'x';
  if(playing) { clearInterval(timer); timer=setInterval(step, Math.max(50,1200/speed)); }
}

window.onload = init;
</script>
<style>
.hole-label { background:transparent!important; border:none!important; box-shadow:none!important; color:#B89A5E; font-weight:700; font-size:11px; }
</style>
</body>
</html>
