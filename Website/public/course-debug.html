<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>TrueCarry — Course Debug Overlay</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; color: #eee; font-family: system-ui, sans-serif; }
#map { position: fixed; inset: 0; }

#panel {
  position: fixed; top: 12px; right: 12px; z-index: 1000;
  background: rgba(10,10,10,0.88); backdrop-filter: blur(6px);
  border: 1px solid #333; border-radius: 10px; padding: 14px 16px;
  min-width: 210px; max-height: calc(100vh - 24px); overflow-y: auto;
}
#panel h2 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 12px; letter-spacing: 0.03em; }
#panel h3 { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin: 12px 0 6px; }

.layer-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; cursor: pointer; user-select: none;
}
.layer-row input[type=checkbox] { accent-color: #5af; width: 14px; height: 14px; cursor: pointer; }
.swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.15); }
.swatch.circle { border-radius: 50%; }
.layer-label { font-size: 12px; color: #ccc; }
.layer-count { margin-left: auto; font-size: 11px; color: #666; }

select {
  width: 100%; padding: 6px 8px; margin-top: 2px;
  background: #1e1e1e; color: #eee; border: 1px solid #444; border-radius: 6px;
  font-size: 12px; cursor: pointer;
}
select:focus { outline: none; border-color: #5af; }

.stat-block { margin-top: 12px; padding-top: 10px; border-top: 1px solid #222; }
.stat-line { display: flex; justify-content: space-between; font-size: 11px; color: #777; padding: 2px 0; }
.stat-line span { color: #aaa; }

.legend-note {
  margin-top: 10px; padding: 6px 8px; background: #1a1a1a; border-radius: 6px;
  font-size: 10px; color: #666; line-height: 1.5;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h2>Course Debug Overlay</h2>

  <h3>Layers</h3>
  <label class="layer-row">
    <input type="checkbox" id="tog-fairway" checked>
    <span class="swatch" style="background:rgba(58,138,32,0.7)"></span>
    <span class="layer-label">Fairways</span>
    <span class="layer-count" id="ct-fairway"></span>
  </label>
  <label class="layer-row">
    <input type="checkbox" id="tog-green" checked>
    <span class="swatch" style="background:#50cc60"></span>
    <span class="layer-label">Greens</span>
    <span class="layer-count" id="ct-green"></span>
  </label>
  <label class="layer-row">
    <input type="checkbox" id="tog-bunker" checked>
    <span class="swatch" style="background:#c8a84a"></span>
    <span class="layer-label">Bunkers</span>
    <span class="layer-count" id="ct-bunker"></span>
  </label>
  <label class="layer-row">
    <input type="checkbox" id="tog-water" checked>
    <span class="swatch" style="background:#2060a8"></span>
    <span class="layer-label">Water</span>
    <span class="layer-count" id="ct-water"></span>
  </label>
  <label class="layer-row">
    <input type="checkbox" id="tog-trees" checked>
    <span class="swatch circle" style="background:#1e7818"></span>
    <span class="layer-label">Trees</span>
    <span class="layer-count" id="ct-trees"></span>
  </label>
  <label class="layer-row">
    <input type="checkbox" id="tog-cart" checked>
    <span class="swatch" style="background:#9e9e8e"></span>
    <span class="layer-label">Cart Paths</span>
    <span class="layer-count" id="ct-cart"></span>
  </label>
  <label class="layer-row">
    <input type="checkbox" id="tog-tees" checked>
    <span class="swatch circle" style="background:#fff"></span>
    <span class="layer-label">Tees &amp; Pins</span>
  </label>

  <h3>Hole</h3>
  <select id="hole-select">
    <option value="-1">All Holes</option>
  </select>

  <div class="stat-block">
    <div class="stat-line">Course <span id="s-name">—</span></div>
    <div class="stat-line">Par <span id="s-par">—</span></div>
    <div class="stat-line">Holes <span id="s-holes">—</span></div>
    <div class="stat-line">Trees <span id="s-trees">—</span></div>
    <div class="stat-line">Cart segs <span id="s-cart">—</span></div>
    <div class="stat-line">Pipeline <span id="s-pipeline">—</span></div>
  </div>

  <div class="legend-note">
    Red tree dots = trees that were<br>
    placed inside fairways (bug indicator)
  </div>
</div>

<script>
// ---- Leaflet setup ----
const map = L.map('map', { zoomControl: true, attributionControl: false });

L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 21, attribution: 'Esri World Imagery' }
).addTo(map);

// ---- Layer groups ----
const LG = {
  fairway: L.layerGroup().addTo(map),
  green:   L.layerGroup().addTo(map),
  bunker:  L.layerGroup().addTo(map),
  water:   L.layerGroup().addTo(map),
  trees:   L.layerGroup().addTo(map),
  cart:    L.layerGroup().addTo(map),
  tees:    L.layerGroup().addTo(map),
};

// ---- Coordinate conversion ----
let origin, cosLat;
function xzToLL(x, z) {
  return [origin.lat + z / 111320, origin.lng + x / (cosLat * 111320)];
}
function polyToLL(poly) { return poly.map(([x, z]) => xzToLL(x, z)); }

// ---- Point-in-polygon test (for fairway violation check) ----
function pip(px, pz, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [xi, zi] = poly[i], [xj, zj] = poly[j];
    if ((zi > pz) !== (zj > pz) && px < ((xj - xi) * (pz - zi)) / (zj - zi) + xi) inside = !inside;
  }
  return inside;
}

// ---- Build layers from course data ----
let courseData = null;
let allFairways = [];

function buildLayers(data, filterHole = -1) {
  Object.values(LG).forEach(lg => lg.clearLayers());
  allFairways = [];

  const holes = filterHole >= 0
    ? data.holes.filter((_, i) => i === filterHole)
    : data.holes;

  // Collect fairways for violation check
  for (const h of data.holes) if (h.fairway) allFairways.push(h.fairway);

  // Fairways
  for (const hole of holes) {
    if (hole.fairway?.length) {
      L.polygon(polyToLL(hole.fairway), {
        color: '#3aaa20', fillColor: '#3aaa20', fillOpacity: 0.35, weight: 1.5,
      }).bindTooltip(`H${hole.number} Fairway`).addTo(LG.fairway);
    }
  }

  // Greens
  let greenCount = 0;
  for (const hole of holes) {
    if (hole.green.polygon?.length) {
      L.polygon(polyToLL(hole.green.polygon), {
        color: '#50ee60', fillColor: '#50ee60', fillOpacity: 0.5, weight: 1.5,
      }).bindTooltip(`H${hole.number} Green`).addTo(LG.green);
      greenCount++;
    } else {
      L.circleMarker(xzToLL(...hole.green.center), {
        radius: 6, color: '#50ee60', fillColor: '#50ee60', fillOpacity: 0.8, weight: 1,
      }).bindTooltip(`H${hole.number} Green (centroid)`).addTo(LG.green);
      greenCount++;
    }
  }

  // Bunkers
  let bunkerCount = 0;
  for (const hole of holes) {
    for (let bi = 0; bi < hole.bunkers.length; bi++) {
      const b = hole.bunkers[bi];
      const depth = hole.bunkerDepths?.[bi] ?? '?';
      L.polygon(polyToLL(b), {
        color: '#c8a84a', fillColor: '#c8a84a', fillOpacity: 0.6, weight: 1.5,
      }).bindTooltip(`H${hole.number} Bunker (depth ${typeof depth === 'number' ? depth.toFixed(2) : depth}m)`).addTo(LG.bunker);
      bunkerCount++;
    }
  }

  // Water
  let waterCount = 0;
  for (const hole of holes) {
    for (const w of hole.water) {
      L.polygon(polyToLL(w), {
        color: '#2060cc', fillColor: '#2060cc', fillOpacity: 0.55, weight: 1.5,
      }).bindTooltip(`H${hole.number} Water`).addTo(LG.water);
      waterCount++;
    }
  }

  // Cart paths
  const cartPaths = filterHole >= 0
    ? data.cartPaths.filter(pts => {
        const h = data.holes[filterHole];
        const fbox = holeBbox(h);
        return pts.some(([x, z]) =>
          x >= fbox.minX && x <= fbox.maxX && z >= fbox.minZ && z <= fbox.maxZ);
      })
    : data.cartPaths;

  for (const pts of cartPaths) {
    if (pts.length < 2) continue;
    L.polyline(pts.map(([x, z]) => xzToLL(x, z)), {
      color: '#b0b0a0', weight: 2, opacity: 0.8,
    }).addTo(LG.cart);
  }
  document.getElementById('ct-cart').textContent = cartPaths.length;

  // Trees — detect violations (in fairway)
  const treesToDraw = filterHole >= 0
    ? data.trees.filter(t => {
        const h = data.holes[filterHole];
        const fbox = holeBbox(h);
        return t.x >= fbox.minX && t.x <= fbox.maxX && t.z >= fbox.minZ && t.z <= fbox.maxZ;
      })
    : data.trees;

  let violationCount = 0;
  for (const t of treesToDraw) {
    const inFairway = allFairways.some(fw => pip(t.x, t.z, fw));
    const col = inFairway ? '#ff3333' : (t.isPine ? '#1e7818' : '#2e8a28');
    if (inFairway) violationCount++;
    L.circleMarker(xzToLL(t.x, t.z), {
      radius: Math.min(5, Math.max(2, t.r * 0.5)),
      color: col, fillColor: col, fillOpacity: 0.75, weight: 0,
    }).addTo(LG.trees);
  }

  // Tees + pins
  for (const hole of holes) {
    const tLL = xzToLL(hole.tee[0], hole.tee[1]);
    const gLL = xzToLL(hole.green.center[0], hole.green.center[1]);

    L.circleMarker(tLL, { radius: 5, color: '#fff', fillColor: '#fff', fillOpacity: 1, weight: 1.5 })
      .bindTooltip(`H${hole.number} Tee (par ${hole.par})`).addTo(LG.tees);
    L.circleMarker(gLL, { radius: 6, color: '#ffd700', fillColor: '#ffd700', fillOpacity: 1, weight: 1.5 })
      .bindTooltip(`H${hole.number} Pin`).addTo(LG.tees);

    // Hole path line
    if (hole.path?.length > 1) {
      L.polyline(hole.path.map(([x, z]) => xzToLL(x, z)), {
        color: 'rgba(255,255,255,0.3)', weight: 1, dashArray: '4 4',
      }).addTo(LG.tees);
    }

    // Hole number label
    L.marker(tLL, {
      icon: L.divIcon({
        html: `<div style="background:rgba(0,0,0,0.6);color:#fff;padding:1px 4px;border-radius:3px;font:bold 10px system-ui;white-space:nowrap">H${hole.number}</div>`,
        className: '', iconAnchor: [-4, 8],
      }),
    }).addTo(LG.tees);
  }

  // Update counts
  document.getElementById('ct-fairway').textContent = holes.filter(h => h.fairway?.length).length;
  document.getElementById('ct-green').textContent = greenCount;
  document.getElementById('ct-bunker').textContent = bunkerCount;
  document.getElementById('ct-water').textContent = waterCount;
  document.getElementById('ct-trees').textContent =
    treesToDraw.length + (violationCount > 0 ? ` (⚠ ${violationCount} in fairway)` : '');

  if (violationCount > 0) document.getElementById('ct-trees').style.color = '#f93';
  else document.getElementById('ct-trees').style.color = '';
}

function holeBbox(hole) {
  const pts = [
    hole.tee, hole.green.center,
    ...(hole.fairway || []),
    ...(hole.green.polygon || []),
    ...hole.bunkers.flat(),
    ...hole.water.flat(),
  ];
  const pad = 40;
  return {
    minX: Math.min(...pts.map(p=>p[0])) - pad,
    maxX: Math.max(...pts.map(p=>p[0])) + pad,
    minZ: Math.min(...pts.map(p=>p[1])) - pad,
    maxZ: Math.max(...pts.map(p=>p[1])) + pad,
  };
}

// ---- Zoom to hole ----
function zoomToHole(holeIdx) {
  if (!courseData) return;
  if (holeIdx < 0) {
    // Full course
    const b = courseData.bbox;
    const sw = xzToLL(b.minX, b.minZ), ne = xzToLL(b.maxX, b.maxZ);
    map.fitBounds([sw, ne], { padding: [30, 30] });
  } else {
    const bbox = holeBbox(courseData.holes[holeIdx]);
    const sw = xzToLL(bbox.minX, bbox.minZ), ne = xzToLL(bbox.maxX, bbox.maxZ);
    map.fitBounds([sw, ne], { padding: [40, 40] });
  }
}

// ---- Layer toggles ----
const TOGGLES = {
  'tog-fairway': LG.fairway,
  'tog-green':   LG.green,
  'tog-bunker':  LG.bunker,
  'tog-water':   LG.water,
  'tog-trees':   LG.trees,
  'tog-cart':    LG.cart,
  'tog-tees':    LG.tees,
};
for (const [id, lg] of Object.entries(TOGGLES)) {
  document.getElementById(id).addEventListener('change', e => {
    if (e.target.checked) map.addLayer(lg); else map.removeLayer(lg);
  });
}

// ---- Hole selector ----
document.getElementById('hole-select').addEventListener('change', e => {
  const idx = parseInt(e.target.value, 10);
  buildLayers(courseData, idx);
  zoomToHole(idx);
});

// ---- Load course data ----
fetch('/course-sim/courses/pinchbrook.json')
  .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
  .then(data => {
    courseData = data;
    origin = data.origin;
    cosLat = Math.cos(origin.lat * Math.PI / 180);

    // Populate stats
    document.getElementById('s-name').textContent = data.meta.name;
    document.getElementById('s-par').textContent = data.meta.par;
    document.getElementById('s-holes').textContent = data.holes.length;
    document.getElementById('s-trees').textContent = data.trees.length.toLocaleString();
    document.getElementById('s-cart').textContent = data.cartPaths.length;
    document.getElementById('s-pipeline').textContent = data.meta.pipeline || 'v1';

    // Populate hole selector
    const sel = document.getElementById('hole-select');
    for (let i = 0; i < data.holes.length; i++) {
      const h = data.holes[i];
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `Hole ${h.number} — Par ${h.par}`;
      sel.appendChild(opt);
    }

    buildLayers(data, -1);
    zoomToHole(-1);
  })
  .catch(err => {
    document.getElementById('panel').insertAdjacentHTML('beforeend',
      `<div style="color:#f55;margin-top:10px;font-size:11px">Error: ${err.message}<br>Make sure dev server is running</div>`
    );
  });
</script>
</body>
</html>
